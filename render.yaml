services:
  - type: web
    name: flowspace-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    startCommand: ""
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        sync: false # User will set this in Render Dashboard (pointing to their production SQL Server/Postgres database)
      - key: JwtSettings__Secret
        generateValue: true # Generates a random secure key automatically
      - key: JwtSettings__Issuer
        value: FlowSpaceProd
      - key: JwtSettings__Audience
        value: FlowSpaceProdUsers

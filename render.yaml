services:
  - type: web
    name: flowspace-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    startCommand: ""
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ConnectionStrings__DefaultConnection
        fromDatabase:
          name: flowspace-db
          property: connectionString
      - key: JwtSettings__Secret
        generateValue: true # Generates a random secure key automatically
      - key: JwtSettings__Issuer
        value: FlowSpaceProd
      - key: JwtSettings__Audience
        value: FlowSpaceProdUsers

databases:
  - name: flowspace-db
    plan: free
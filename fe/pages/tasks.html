<!-- ============================================================
     FlowSpace — Tasks Page
     ============================================================ -->
<div class="page-enter" id="tasks-page">
  <style>
    #tasks-page .tasks-table-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    #tasks-table {
      table-layout: fixed;
      width: 100%;
      min-width: 1180px;
    }

    #tasks-table th,
    #tasks-table td {
      overflow: hidden;
    }

    #tasks-table th {
      line-height: 1.25;
      vertical-align: middle;
    }

    #tasks-table .task-col-check { width: 48px; }
    #tasks-table .task-col-title { width: 28%; }
    #tasks-table .task-col-project { width: 17%; }
    #tasks-table .task-col-assignee { width: 14%; }
    #tasks-table .task-col-priority { width: 126px; }
    #tasks-table .task-col-status { width: 150px; }
    #tasks-table .task-col-due { width: 132px; }
    #tasks-table .task-col-actions { width: 96px; }

    #tasks-table .task-title-main,
    #tasks-table .task-project-text,
    #tasks-table .task-assignee-name {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #tasks-table .task-title-main {
      white-space: nowrap;
    }

    #tasks-table .task-project-text {
      white-space: normal;
      word-break: normal;
      overflow-wrap: anywhere;
      line-height: 1.45;
      max-height: 2.9em;
    }

    #tasks-table .task-assignee-wrap {
      min-width: 0;
    }

    #tasks-table .task-assignee-name {
      white-space: nowrap;
    }

    #tasks-table .task-due-cell,
    #tasks-table .task-actions-cell {
      white-space: nowrap;
    }

    #tasks-table .task-actions {
      justify-content: center;
      flex-wrap: nowrap;
    }

    #tasks-table .fs-badge {
      max-width: 100%;
      white-space: nowrap;
    }

    @media (max-width: 767.98px) {
      #tasks-table {
        min-width: 1040px;
      }

      #tasks-page .fs-card {
        border-radius: var(--fs-radius-md);
      }
    }
  </style>

  <!-- Page Header -->
  <div class="fs-page-header">
    <div>
      <h1 class="fs-page-title">Quản lý Công việc</h1>
      <p class="fs-page-subtitle" id="tasks-count-label">Danh sách công việc đang xử lý</p>
    </div>
    <div class="d-flex gap-2 align-items-center" id="tasks-header-actions">
      <!-- Toggle view -->
      <div class="fs-view-toggle-group">
        <button class="view-toggle active" data-view="list" title="Danh sách">
          <i class="bi bi-list-ul"></i>
        </button>
        <button class="view-toggle" data-view="card" title="Thẻ">
          <i class="bi bi-grid-3x3-gap"></i>
        </button>
      </div>
      <button class="btn btn-primary btn-sm" id="task-new-btn">
        <i class="bi bi-plus-lg"></i> Tạo công việc
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="fs-filters d-flex align-items-center flex-wrap gap-2 mb-3" style="padding:12px;background:var(--fs-card-bg);border:1px solid var(--fs-border);border-radius:var(--fs-radius-md)">
    <div class="position-relative flex-grow-1" style="min-width:160px;max-width:220px">
      <input type="text" class="fs-search-input" id="task-search" placeholder="Tìm công việc..." style="height:34px;font-size:13px;padding-left:30px">
      <i class="bi bi-search position-absolute top-50 translate-middle-y text-muted" style="left:10px;font-size:12px"></i>
    </div>
    <select class="fs-filter-select" id="task-filter-status" style="height:34px;font-size:13px;min-width:130px">
      <option value="">Tất cả trạng thái</option>
      <option value="todo">Chưa bắt đầu</option>
      <option value="inprogress">Đang thực hiện</option>
      <option value="onhold">Đang chờ</option>
      <option value="done">Đã hoàn thành</option>
      <option value="cancelled">Đã hủy</option>
    </select>
    <select class="fs-filter-select" id="task-filter-priority" style="height:34px;font-size:13px;min-width:120px">
      <option value="">Tất cả ưu tiên</option>
      <option value="high">Cao</option>
      <option value="medium">Trung bình</option>
      <option value="low">Thấp</option>
    </select>
    <select class="fs-filter-select" id="task-filter-project" style="height:34px;font-size:13px;min-width:140px">
      <option value="">Tất cả dự án</option>
    </select>
    <select class="fs-filter-select" id="task-filter-assignee" style="height:34px;font-size:13px;min-width:140px">
      <option value="">Tất cả người thực hiện</option>
    </select>
    <button class="btn btn-ghost btn-sm" id="task-filter-reset" style="color:var(--fs-text-muted);height:34px">
      <i class="bi bi-x-circle"></i> Xoá lọc
    </button>
  </div>

  <!-- List View -->
  <div id="tasks-list-view">
    <div class="fs-card" style="padding:0;overflow:hidden">
      <div class="tasks-table-scroll">
        <table class="fs-table" id="tasks-table">
          <colgroup>
            <col class="task-col-check">
            <col class="task-col-title">
            <col class="task-col-project">
            <col class="task-col-assignee">
            <col class="task-col-priority">
            <col class="task-col-status">
            <col class="task-col-due">
            <col class="task-col-actions">
          </colgroup>
          <thead>
            <tr>
              <th class="task-col-check" style="text-align:center"></th>
              <th class="task-col-title">Tiêu đề</th>
              <th class="task-col-project">Dự án</th>
              <th class="task-col-assignee">Người thực hiện</th>
              <th class="task-col-priority">Độ ưu tiên</th>
              <th class="task-col-status">Trạng thái</th>
              <th class="task-col-due">Hạn hoàn thành</th>
              <th class="task-col-actions" style="text-align:center">Thao tác</th>
            </tr>
          </thead>
          <tbody id="tasks-table-body">
            <tr><td colspan="8"><div class="fs-empty"><div class="fs-spinner mx-auto"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Card View -->
  <div id="tasks-card-view" class="d-none">
    <div class="row g-3 mb-3" id="tasks-card-grid">
      <!-- Rendered dynamically -->
    </div>
  </div>

  <!-- Accessible Pagination Container -->
  <div class="d-flex align-items-center justify-content-between mt-3 flex-wrap gap-2" id="tasks-pagination-wrap">
    <span class="fs-small text-muted" id="tasks-pagination-info">Đang hiển thị...</span>
    <nav aria-label="Phân trang kết quả tìm kiếm">
      <ul class="pagination pagination-sm m-0" id="tasks-pagination-ul">
        <!-- Rendered dynamically by JS -->
      </ul>
    </nav>
  </div>

</div>

<!-- Create/Edit Task Modal -->
<div class="fs-modal-overlay" id="task-modal-overlay" style="display:none">
  <div class="fs-modal" style="max-width:580px">
    <div class="fs-modal-header">
      <h5 class="fs-h5 m-0" id="task-modal-title">Tạo công việc mới</h5>
      <button class="btn btn-ghost btn-icon btn-sm" id="task-modal-close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="fs-modal-body">
      <input type="hidden" id="task-modal-id">
      <div class="fs-form-group">
        <label class="fs-label-text" for="task-modal-name">Tiêu đề *</label>
        <input type="text" class="fs-input" id="task-modal-name" placeholder="Mô tả ngắn về công việc...">
      </div>
      <div class="fs-form-group">
        <label class="fs-label-text" for="task-modal-desc">Mô tả chi tiết</label>
        <textarea class="fs-textarea" id="task-modal-desc" rows="3" placeholder="Chi tiết yêu cầu, điều kiện hoàn thành..."></textarea>
      </div>
      <div class="row g-3">
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-project">Dự án</label>
          <select class="fs-select" id="task-modal-project"></select>
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-assignee">Người thực hiện</label>
          <select class="fs-select" id="task-modal-assignee"></select>
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-priority">Độ ưu tiên</label>
          <select class="fs-select" id="task-modal-priority">
            <option value="high">Cao</option>
            <option value="medium" selected>Trung bình</option>
            <option value="low">Thấp</option>
          </select>
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-status">Trạng thái</label>
          <select class="fs-select" id="task-modal-status">
            <option value="todo">Chưa bắt đầu</option>
            <option value="inprogress">Đang thực hiện</option>
            <option value="onhold">Đang chờ</option>
            <option value="done">Đã hoàn thành</option>
            <option value="cancelled">Đã hủy</option>
          </select>
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-start">Ngày bắt đầu</label>
          <input type="date" class="fs-input" id="task-modal-start">
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-due">Hạn hoàn thành</label>
          <input type="date" class="fs-input" id="task-modal-due">
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-est">Ước tính (giờ)</label>
          <input type="number" class="fs-input" id="task-modal-est" placeholder="0" min="0">
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-difficulty">Độ khó</label>
          <select class="fs-select" id="task-modal-difficulty">
            <option value="">— Chọn độ khó —</option>
            <option value="Dễ">Dễ</option>
            <option value="Trung bình">Trung bình</option>
            <option value="Khó">Khó</option>
          </select>
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="task-modal-score">Điểm hoàn thành (0-100)</label>
          <input type="number" class="fs-input" id="task-modal-score" placeholder="Chưa đánh giá" min="0" max="100">
        </div>
      </div>
    </div>
    <div class="fs-modal-footer">
      <button class="btn btn-ghost btn-sm" id="task-modal-cancel">Hủy</button>
      <button class="btn btn-primary btn-sm" id="task-modal-save">
        <i class="bi bi-check2"></i> Lưu
      </button>
    </div>
  </div>
</div>

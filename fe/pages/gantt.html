<!-- ============================================================
     FlowSpace — Gantt Chart Page
     ============================================================ -->
<div class="page-enter" id="gantt-page">

  <div class="fs-page-header">
    <div>
      <h1 class="fs-page-title">Gantt Chart</h1>
      <p class="fs-page-subtitle">Timeline dự án và phân công công việc</p>
    </div>
    <div class="d-flex align-items-center gap-2">
      <select class="fs-filter-select" id="gantt-filter-project">
        <option value="">Tất cả dự án</option>
      </select>
      <div class="fs-view-toggle-group">
        <button class="view-toggle gantt-zoom active" data-zoom="week" title="Xem theo Tuần">Tuần</button>
        <button class="view-toggle gantt-zoom" data-zoom="month" title="Xem theo Tháng">Tháng</button>
      </div>
    </div>
  </div>

  <!-- Gantt Container -->
  <div class="fs-card" style="padding:0;overflow:hidden;position:relative">
    <svg id="gantt-svg-layer" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;overflow:visible"></svg>
    <div id="gantt-container" style="overflow-x:auto;position:relative;z-index:2">
      <!-- Rendered by JS -->
    </div>
  </div>

</div>

<style>
.gantt-table { min-width: 100%; border-collapse: separate; border-spacing: 0; }
.gantt-task-col { width: 300px; min-width: 300px; }
@media (max-width: 767.98px) {
  .gantt-task-col,
  .gantt-task-header,
  .gantt-task-cell {
    width: 180px !important;
    min-width: 180px !important;
    padding: 8px 10px !important;
  }
}
.gantt-header-row { position: sticky; top: 0; z-index: 20; background: var(--fs-bg-secondary); }
.gantt-header-cell {
  padding: 10px 8px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--fs-text-muted);
  border-bottom: 1.5px solid var(--fs-border);
  border-right: 1px solid var(--fs-border);
  white-space: nowrap;
  text-align: center;
  background: var(--fs-bg-secondary);
}
.gantt-task-header {
  position: sticky;
  left: 0;
  top: 0;
  z-index: 30;
  padding: 10px 14px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--fs-text-muted);
  border-bottom: 1.5px solid var(--fs-border);
  border-right: 2px solid var(--fs-border);
  background: var(--fs-bg-secondary);
  width: 300px;
  min-width: 300px;
  box-shadow: 2px 0 8px rgba(0,0,0,0.06);
}
.gantt-row { border-bottom: 1px solid var(--fs-border); transition: var(--fs-transition); }
.gantt-row:hover { background: var(--fs-bg-hover); }
.gantt-row:hover .gantt-task-cell { background: var(--fs-bg-hover) !important; }
.gantt-task-cell {
  position: sticky;
  left: 0;
  z-index: 15;
  padding: 10px 14px;
  border-right: 2px solid var(--fs-border);
  border-bottom: 1px solid var(--fs-border);
  vertical-align: middle;
  width: 300px;
  min-width: 300px;
  background: var(--fs-bg);
  box-shadow: 2px 0 8px rgba(0,0,0,0.06);
}
.gantt-task-name { font-size: 13px; font-weight: 600; color: var(--fs-text); }
.gantt-task-meta { font-size: 11px; color: var(--fs-text-muted); margin-top: 2px; }
.gantt-day-cell { position: relative; height: 44px; border-right: 1px solid var(--fs-border); border-bottom: 1px solid var(--fs-border); min-width: 32px; }
.gantt-day-cell.today { background: rgba(99, 102, 241, 0.06); }
.gantt-bar-wrapper { position: absolute; top: 50%; transform: translateY(-50%); height: 22px; }
.gantt-bar {
  height: 100%;
  opacity: 0.92;
  cursor: pointer;
  user-select: none;
  transition: all 0.15s ease;
  display: flex;
  align-items: center;
  padding: 0 6px;
  font-size: 10px;
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  box-sizing: border-box;
}
.gantt-bar:hover { opacity: 1; filter: brightness(1.08); box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
.gantt-bar.critical {
  box-shadow: 0 0 8px rgba(239,68,68,0.4);
  opacity: 1;
}
.gantt-project-row { background: var(--fs-bg-secondary); }
.gantt-project-row .gantt-task-cell { background: var(--fs-bg-secondary) !important; }
.gantt-project-row .gantt-task-name { font-weight: 700; color: var(--fs-accent); font-size: 13px; }
.gantt-today-line {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--fs-danger);
  opacity: 0.7;
  z-index: 3;
  pointer-events: none;
}

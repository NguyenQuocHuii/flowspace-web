<!-- FlowSpace — Chat Page -->
<div class="page-enter" id="chat-page" style="height:calc(100vh - var(--fs-topbar-height) - 56px);display:flex;gap:16px;padding:0;margin:-28px -32px;overflow:hidden">

  <!-- Channels sidebar -->
  <div id="chat-sidebar" style="width:260px;flex-shrink:0;background:var(--fs-bg);border-right:1.5px solid var(--fs-border);display:flex;flex-direction:column;overflow:hidden">
    <div style="padding:16px 14px;border-bottom:1px solid var(--fs-border)">
      <div class="d-flex align-items-center justify-content-between mb-2">
        <span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--fs-text-muted)">Kênh</span>
      </div>
      <div id="chat-channels-list"></div>
    </div>
    <div style="padding:12px 14px 6px">
      <div style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--fs-text-muted);margin-bottom:8px">Tin nhắn trực tiếp</div>
      <div id="chat-dm-list"></div>
    </div>
  </div>

  <!-- Chat area -->
  <div id="chat-main" style="flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--fs-bg)">

    <!-- Header -->
    <div id="chat-header" style="padding:14px 20px;border-bottom:1.5px solid var(--fs-border);display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div style="width:8px;height:8px;border-radius:50%;background:var(--fs-success)"></div>
      <div style="flex:1">
        <div id="chat-channel-name" style="font-weight:600;font-size:14px">Chọn kênh để bắt đầu</div>
        <div id="chat-channel-desc" class="fs-small"></div>
      </div>
      <!-- Search Box -->
      <div style="position:relative;width:240px">
        <i class="bi bi-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--fs-text-muted);font-size:12px"></i>
        <input type="text" id="chat-search-input" class="fs-input" style="padding-left:32px;height:32px;font-size:13px;width:100%" placeholder="Tìm kiếm tin nhắn...">
      </div>
    </div>

    <!-- Pinned Panel -->
    <div id="chat-pinned-panel" style="display:none;padding:10px 20px;background:var(--fs-bg-secondary);border-bottom:1px solid var(--fs-border);flex-shrink:0">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--fs-text-muted);margin-bottom:6px">
        <i class="bi bi-pin-angle-fill me-1"></i>Tin nhắn đã ghim
      </div>
      <div id="chat-pinned-list" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:2px">
      <div class="fs-empty"><i class="bi bi-chat-dots"></i><p>Chọn kênh để xem tin nhắn</p></div>
    </div>

    <!-- Input -->
    <div id="chat-input-area" style="padding:12px 20px;border-top:1.5px solid var(--fs-border);flex-shrink:0;display:none;position:relative">
      
      <!-- Mention Dropdown -->
      <div id="chat-mention-dropdown" style="display:none;position:absolute;bottom:100%;left:20px;width:260px;background:var(--fs-bg);border:1px solid var(--fs-border);border-radius:var(--fs-radius);box-shadow:var(--fs-shadow);margin-bottom:8px;max-height:200px;overflow-y:auto;z-index:100">
        <!-- Render user items here -->
      </div>

      <!-- Reply Panel -->
      <div id="chat-reply-panel" style="display:none;padding:8px 12px;background:var(--fs-bg-secondary);border:1px solid var(--fs-border);border-bottom:none;border-radius:var(--fs-radius-md) var(--fs-radius-md) 0 0;align-items:center;justify-content:space-between;font-size:13px;border-left:3px solid var(--fs-accent)">
        <div style="min-width:0;flex:1">
          <div style="font-weight:600;font-size:12px;color:var(--fs-accent);margin-bottom:2px" id="chat-reply-name">Đang trả lời...</div>
          <div style="color:var(--fs-text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis" id="chat-reply-text">Nội dung tin nhắn</div>
        </div>
        <button class="btn btn-icon btn-sm" id="chat-reply-cancel" style="color:var(--fs-text-muted)"><i class="bi bi-x"></i></button>
      </div>

      <div style="display:flex;gap:10px;align-items:flex-end;background:var(--fs-bg-secondary);border:1.5px solid var(--fs-border);border-radius:var(--fs-radius-md);padding:10px 14px;transition:var(--fs-transition)" id="chat-input-wrap">
        <textarea id="chat-input" rows="1" placeholder="Nhắn tin..." style="flex:1;border:none;background:transparent;outline:none;font-family:var(--fs-font);font-size:13px;resize:none;max-height:120px;line-height:1.5;color:var(--fs-text)"></textarea>
        <button id="chat-send-btn" class="btn btn-primary btn-icon btn-sm" style="flex-shrink:0;align-self:flex-end">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
      <div class="fs-small mt-1" style="color:var(--fs-text-muted);padding:0 4px">Nhấn Enter để gửi · Shift+Enter để xuống dòng · Gõ @ để nhắc tên</div>
    </div>

  </div>

</div>

<style>
.chat-channel-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 8px;
  border-radius: var(--fs-radius);
  cursor: pointer;
  transition: var(--fs-transition);
  font-size: 13px;
  color: var(--fs-text-secondary);
  margin-bottom: 1px;
}
.chat-channel-item:hover { background: var(--fs-bg-secondary); color: var(--fs-text); }
.chat-channel-item.active { background: var(--fs-accent-light); color: var(--fs-accent-dark); font-weight: 600; }
.chat-channel-item .ch-hash { font-size: 14px; width: 16px; text-align: center; flex-shrink: 0; }
.chat-msg {
  display: flex;
  gap: 12px;
  padding: 8px 16px;
  transition: background 0.15s ease;
  border-radius: var(--fs-radius-md);
  margin: 2px 8px;
}
.chat-msg:hover {
  background: var(--fs-bg-secondary);
}
.chat-msg:hover .chat-msg-time { opacity: 1; }
.chat-msg-body { flex: 1; min-width: 0; }
.chat-msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
.chat-msg-name { font-size: 13px; font-weight: 600; color: var(--fs-text); }
.chat-msg-time { font-size: 11px; color: var(--fs-text-muted); opacity: 0; transition: opacity 0.15s; }
.chat-msg-text { font-size: 13px; color: var(--fs-text-secondary); line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.chat-msg-divider { text-align: center; font-size: 11px; color: var(--fs-text-muted); margin: 16px 0; position: relative; }
.chat-msg-divider::before, .chat-msg-divider::after { content:''; position:absolute; top:50%; width:calc(50% - 60px); height:1px; background:var(--fs-border); }
.chat-msg-divider::before { left:0; }
.chat-msg-divider::after { right:0; }

#chat-input-wrap {
  border: 1px solid var(--fs-border) !important;
  box-shadow: var(--fs-shadow-xs);
  transition: all 0.2s ease;
}
#chat-input-wrap:focus-within {
  border-color: var(--fs-accent) !important;
  box-shadow: 0 0 0 3px var(--fs-accent-light) !important;
}

.chat-msg-actions {
  display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; align-items: center; padding: 2px 8px;
  background: var(--fs-bg); border: 1px solid var(--fs-border); border-radius: var(--fs-radius);
  position: absolute; right: 20px; top: -12px; z-index: 10;
}
.chat-msg:hover .chat-msg-actions { opacity: 1; }
.chat-msg-action-btn { background: none; border: none; cursor: pointer; color: var(--fs-text-muted); font-size: 13px; padding: 4px; transition: color 0.15s; }
.chat-msg-action-btn:hover { color: var(--fs-text); }

.chat-quoted-msg {
  border-left: 3px solid var(--fs-border); padding-left: 8px; margin-bottom: 4px;
  font-size: 12px; color: var(--fs-text-secondary); cursor: pointer;
}
.chat-mention-highlight {
  background: var(--fs-accent-light); color: var(--fs-accent-dark); font-weight: 600; padding: 0 4px; border-radius: 4px;
}
.chat-mention-item {
  padding: 8px 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px;
}
.chat-mention-item:hover, .chat-mention-item.active { background: var(--fs-bg-secondary); }

.chat-search-highlight { background: #fef08a; color: #854d0e; padding: 0 2px; border-radius: 2px; }

.chat-pinned-item {
  background: var(--fs-bg); border: 1px solid var(--fs-border); border-radius: var(--fs-radius); padding: 6px 12px;
  font-size: 12px; display: flex; gap: 10px; align-items: baseline;
}
</style>

<!-- ============================================================
     FlowSpace — Projects Page
     ============================================================ -->
<div class="page-enter" id="projects-page">

  <!-- Page Header -->
  <div class="fs-page-header">
    <div>
      <h1 class="fs-page-title">Quản lý Dự án</h1>
      <p class="fs-page-subtitle" id="proj-count-label">Đang tải...</p>
    </div>
    <div class="d-flex gap-2" id="proj-header-actions">
      <!-- Toggle view -->
      <div class="fs-view-toggle-group">
        <button class="view-toggle active" data-view="list" title="Danh sách">
          <i class="bi bi-list-ul"></i>
        </button>
        <button class="view-toggle" data-view="card" title="Thẻ">
          <i class="bi bi-grid-3x3-gap"></i>
        </button>
      </div>
      <button class="btn btn-primary btn-sm fs-manager-only" id="proj-new-btn" style="display:none">
        <i class="bi bi-plus-lg"></i> Tạo dự án
      </button>
    </div>
  </div>

  <!-- Filters -->
  <div class="fs-filters">
    <input type="text" class="fs-search-input" id="proj-search" placeholder="Tìm kiếm dự án...">
    <select class="fs-filter-select" id="proj-filter-status">
      <option value="">Tất cả trạng thái</option>
      <option value="active">Đang chạy</option>
      <option value="on_hold">Tạm dừng</option>
      <option value="done">Hoàn thành</option>
    </select>
    <select class="fs-filter-select" id="proj-filter-priority">
      <option value="">Tất cả độ ưu tiên</option>
      <option value="high">Cao</option>
      <option value="medium">Trung bình</option>
      <option value="low">Thấp</option>
    </select>
    <button class="btn btn-ghost btn-sm" id="proj-filter-reset" style="color:var(--fs-text-muted)">
      <i class="bi bi-x-circle"></i> Xoá lọc
    </button>
  </div>

  <!-- List View -->
  <div id="proj-list-view">
    <div class="fs-card" style="padding:0;overflow:hidden">
      <div class="table-responsive" style="overflow-x:auto;-webkit-overflow-scrolling:touch">
        <table class="fs-table" id="proj-table" style="min-width:760px">
          <thead>
            <tr>
              <th style="width:90px">MÃ</th>
              <th style="min-width:180px">Tên dự án</th>
              <th style="min-width:110px">Trạng thái</th>
              <th style="min-width:110px">Độ ưu tiên</th>
              <th style="min-width:130px">Tiến độ</th>
              <th style="min-width:120px">Thành viên</th>
              <th style="min-width:110px">Hạn</th>
              <th style="width:80px;text-align:center">Thao tác</th>
            </tr>
          </thead>
          <tbody id="proj-table-body">
            <tr><td colspan="8"><div class="fs-empty"><div class="fs-spinner mx-auto"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Card View -->
  <div id="proj-card-view" style="display:none">
    <div class="row g-3" id="proj-card-grid">
      <!-- Rendered by JS -->
    </div>
  </div>

  <!-- Accessible Pagination Container -->
  <div class="d-flex align-items-center justify-content-between mt-3 flex-wrap gap-2" id="proj-pagination-wrap">
    <span class="fs-small text-muted" id="proj-pagination-info">Đang hiển thị...</span>
    <nav aria-label="Phân trang kết quả tìm kiếm">
      <ul class="pagination pagination-sm m-0" id="proj-pagination-ul">
        <!-- Rendered dynamically by JS -->
      </ul>
    </nav>
  </div>

</div>

<!-- Create/Edit Project Modal -->
<div class="fs-modal-overlay" id="proj-modal-overlay" style="display:none">
  <div class="fs-modal">
    <div class="fs-modal-header">
      <h5 class="fs-h5 m-0" id="proj-modal-title">Tạo dự án mới</h5>
      <button class="btn btn-ghost btn-icon btn-sm" id="proj-modal-close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="fs-modal-body">
      <input type="hidden" id="proj-modal-id">
      <div class="fs-form-group">
        <label class="fs-label-text" for="proj-modal-name">Tên dự án *</label>
        <input type="text" class="fs-input" id="proj-modal-name" placeholder="VD: FlowSpace v3.0">
      </div>
      <div class="fs-form-group">
        <label class="fs-label-text" for="proj-modal-code">Mã dự án</label>
        <input type="text" class="fs-input" id="proj-modal-code" placeholder="VD: FS-007">
      </div>
      <div class="fs-form-group">
        <label class="fs-label-text" for="proj-modal-desc">Mô tả</label>
        <textarea class="fs-textarea" id="proj-modal-desc" rows="3" placeholder="Mô tả ngắn về dự án..."></textarea>
      </div>
      <div class="row g-3">
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="proj-modal-status">Trạng thái</label>
          <select class="fs-select" id="proj-modal-status">
            <option value="active">Đang chạy</option>
            <option value="on_hold">Tạm dừng</option>
            <option value="done">Hoàn thành</option>
          </select>
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="proj-modal-priority">Độ ưu tiên</label>
          <select class="fs-select" id="proj-modal-priority">
            <option value="high">Cao</option>
            <option value="medium">Trung bình</option>
            <option value="low">Thấp</option>
          </select>
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="proj-modal-start">Ngày bắt đầu</label>
          <input type="date" class="fs-input" id="proj-modal-start">
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="proj-modal-end">Ngày kết thúc</label>
          <input type="date" class="fs-input" id="proj-modal-end">
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="proj-modal-client">Khách hàng</label>
          <input type="text" class="fs-input" id="proj-modal-client" placeholder="VD: Công ty ABC">
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="proj-modal-budget">Ngân sách (VNĐ)</label>
          <input type="number" class="fs-input" id="proj-modal-budget" placeholder="VD: 50000000">
        </div>
      </div>
    </div>
    <div class="fs-modal-footer">
      <button class="btn btn-ghost btn-sm" id="proj-modal-cancel">Hủy</button>
      <button class="btn btn-primary btn-sm" id="proj-modal-save">
        <i class="bi bi-check2"></i> Lưu
      </button>
    </div>
  </div>
</div>

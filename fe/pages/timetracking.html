<!-- ============================================================
     FlowSpace — Time Tracking Page
     ============================================================ -->
<div class="page-enter" id="timetracking-page">

  <div class="fs-page-header">
    <div>
      <h1 class="fs-page-title">Time Tracking</h1>
      <p class="fs-page-subtitle">Ghi nhận và theo dõi giờ làm việc</p>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-primary btn-sm" id="tt-manual-log-btn">
        <i class="bi bi-plus-lg me-1"></i> Nhập thủ công
      </button>
    </div>
  </div>

  <!-- Top row: Timer + Stats -->
  <div class="row g-3 mb-4">

    <!-- Timer Card -->
    <div class="col-12 col-lg-5">
      <div class="fs-card" style="text-align:center;padding:28px">
        <div class="fs-label mb-3">Đang theo dõi</div>

        <!-- Task selector -->
        <select class="fs-select mb-4" id="tt-task-select">
          <option value="">-- Chọn công việc --</option>
        </select>

        <!-- Timer display -->
        <div id="tt-display" style="font-size:52px;font-weight:700;letter-spacing:2px;font-variant-numeric:tabular-nums;color:var(--fs-text);margin-bottom:20px;font-family:'JetBrains Mono',monospace">
          00:00:00
        </div>

        <!-- Controls -->
        <div class="d-flex justify-content-center gap-3" id="tt-controls-wrap">
          <button class="btn btn-primary" id="tt-start-btn" style="min-width:120px;padding:10px">
            <i class="bi bi-play-fill"></i> Bắt đầu
          </button>
        </div>

        <!-- Note input (shows when running) -->
        <div id="tt-note-wrap" style="display:none;margin-top:16px">
          <input type="text" class="fs-input" id="tt-note" placeholder="Ghi chú (tuỳ chọn)...">
        </div>

        <!-- Status text -->
        <div id="tt-status" class="fs-small mt-3" style="color:var(--fs-text-muted)">
          Chọn công việc và nhấn bắt đầu
        </div>
      </div>
    </div>

    <!-- Weekly Stats -->
    <div class="col-12 col-lg-7">
      <div class="fs-card">
        <div class="fs-card-header">
          <h6 class="fs-h6 m-0"><i class="bi bi-bar-chart me-2" style="color:var(--fs-accent)"></i>Giờ làm theo dự án</h6>
          <select class="fs-filter-select" id="tt-period-select" style="font-size:12px">
            <option value="week">Tuần này</option>
            <option value="month">Tháng này</option>
            <option value="all">Tất cả</option>
          </select>
        </div>
        <canvas id="tt-project-chart" style="max-height:180px"></canvas>
      </div>
    </div>

  </div>

  <!-- Log Table -->
  <div class="fs-card" style="padding:0;overflow:hidden">
    <div class="fs-card-header" style="padding:14px 16px;margin:0;border-radius:0">
      <h6 class="fs-h6 m-0"><i class="bi bi-list-ul me-2" style="color:var(--fs-accent)"></i>Nhật ký giờ làm</h6>
      <div class="d-flex gap-2">
        <span class="fs-badge badge-accent" id="tt-total-badge">0h tổng</span>
        <button class="btn btn-outline btn-sm" id="tt-add-manual-btn">
          <i class="bi bi-plus"></i> Ghi thủ công
        </button>
      </div>
    </div>
    <table class="fs-table">
      <thead>
        <tr>
          <th>Công việc</th>
          <th>Dự án</th>
          <th>Ngày</th>
          <th>Giờ</th>
          <th>Ghi chú</th>
          <th style="width:100px;text-align:center">Thao tác</th>
        </tr>
      </thead>
      <tbody id="tt-log-body">
        <tr><td colspan="6"><div class="fs-empty"><div class="fs-spinner mx-auto"></div></div></td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Manual Log Modal -->
<div class="fs-modal-overlay" id="tt-modal-overlay" style="display:none">
  <div class="fs-modal" style="max-width:440px">
    <div class="fs-modal-header">
      <h5 class="fs-h5 m-0">Ghi giờ thủ công</h5>
      <button class="btn btn-ghost btn-icon btn-sm" id="tt-modal-close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="fs-modal-body">
      <div class="fs-form-group">
        <label class="fs-label-text">Công việc</label>
        <select class="fs-select" id="tt-modal-task"></select>
      </div>
      <div class="row g-3">
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="tt-modal-hours">Số giờ</label>
          <input type="number" class="fs-input" id="tt-modal-hours" min="0.5" max="24" step="0.5" value="1">
        </div>
        <div class="col-6 fs-form-group">
          <label class="fs-label-text" for="tt-modal-date">Ngày</label>
          <input type="date" class="fs-input" id="tt-modal-date">
        </div>
      </div>
      <div class="fs-form-group">
        <label class="fs-label-text" for="tt-modal-note">Ghi chú</label>
        <input type="text" class="fs-input" id="tt-modal-note" placeholder="Mô tả công việc đã làm...">
      </div>
    </div>
    <div class="fs-modal-footer">
      <button class="btn btn-ghost btn-sm" id="tt-modal-cancel">Hủy</button>
      <button class="btn btn-primary btn-sm" id="tt-modal-save">Lưu giờ</button>
    </div>
  </div>
</div>

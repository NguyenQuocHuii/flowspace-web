<!-- FlowSpace — Requests Page -->
<div class="page-enter" id="requests-page">
  <div class="fs-page-header">
    <div>
      <h1 class="fs-page-title">Yêu cầu</h1>
      <p class="fs-page-subtitle" id="req-count-label">Danh sách đơn từ yêu cầu nội bộ</p>
    </div>
    <button class="btn btn-primary btn-sm" id="req-new-btn">
      <i class="bi bi-plus-lg"></i> Tạo yêu cầu
    </button>
  </div>

  <!-- Tabs -->
  <div class="fs-tabs" id="req-tabs">
    <button class="fs-tab active" data-tab="all">Tất cả</button>
    <button class="fs-tab" data-tab="pending">Chờ duyệt</button>
    <button class="fs-tab" data-tab="approved">Đã duyệt</button>
    <button class="fs-tab" data-tab="rejected">Từ chối</button>
  </div>

  <div id="req-list">
    <!-- Rendered dynamically by requests.js -->
  </div>

  <!-- Accessible Pagination Container -->
  <div class="d-flex align-items-center justify-content-between mt-3 flex-wrap gap-2" id="req-pagination-wrap">
    <span class="fs-small text-muted" id="req-pagination-info">Hiển thị danh sách yêu cầu</span>
    <nav aria-label="Phân trang kết quả tìm kiếm">
      <ul class="pagination pagination-sm m-0" id="req-pagination-ul">
        <!-- Rendered dynamically by JS -->
      </ul>
    </nav>
  </div>
</div>

<!-- New Request Modal -->
<div class="fs-modal-overlay" id="req-modal-overlay" style="display:none">
  <div class="fs-modal">
    <div class="fs-modal-header">
      <h5 class="fs-h5 m-0">Tạo yêu cầu mới</h5>
      <button class="btn btn-ghost btn-icon btn-sm" id="req-modal-close"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="fs-modal-body">
      <div class="fs-form-group">
        <label class="fs-label-text">Loại yêu cầu</label>
        <select class="fs-select" id="req-modal-type">
          <option value="leave">🏖️ Nghỉ phép</option>
          <option value="purchase">🛒 Xin mua hàng</option>
          <option value="payment">💳 Xin thanh toán</option>
          <option value="advance">💵 Xin tạm ứng</option>
          <option value="device">💻 Xin cấp thiết bị</option>
          <option value="it_support">🛠️ Xin hỗ trợ IT</option>
          <option value="tech_support">🔧 Xin hỗ trợ kỹ thuật</option>
          <option value="repair">⚡ Đề nghị sửa chữa</option>
          <option value="recruitment">👥 Đề nghị tuyển dụng</option>
          <option value="budget_increase">📈 Đề nghị tăng ngân sách</option>
          <option value="overtime">⏰ Tăng ca</option>
          <option value="remote">🏠 Làm remote</option>
        </select>
      </div>
      <div class="row g-2">
        <div class="col-6">
          <div class="fs-form-group">
            <label class="fs-label-text" for="req-modal-priority">Mức ưu tiên</label>
            <select class="fs-select" id="req-modal-priority">
              <option value="medium">Bình thường</option>
              <option value="high">🔴 Cao (Cần gấp)</option>
              <option value="low">Thấp</option>
            </select>
          </div>
        </div>
        <div class="col-6">
          <div class="fs-form-group">
            <label class="fs-label-text" for="req-modal-file">File đính kèm</label>
            <input type="file" class="fs-input" id="req-modal-file" style="padding:5px 8px;font-size:12px">
          </div>
        </div>
      </div>
      <div class="fs-form-group">
        <label class="fs-label-text" for="req-modal-title">Tiêu đề</label>
        <input type="text" class="fs-input" id="req-modal-title" placeholder="Mô tả ngắn yêu cầu...">
      </div>
      <div class="fs-form-group">
        <label class="fs-label-text" for="req-modal-desc">Chi tiết</label>
        <textarea class="fs-textarea" id="req-modal-desc" rows="3" placeholder="Mô tả chi tiết yêu cầu, lý do, thời gian..."></textarea>
      </div>
    </div>
    <div class="fs-modal-footer">
      <button class="btn btn-ghost btn-sm" id="req-modal-cancel">Hủy</button>
      <button class="btn btn-primary btn-sm" id="req-modal-save"><i class="bi bi-send"></i> Gửi yêu cầu</button>
    </div>
  </div>
</div>
